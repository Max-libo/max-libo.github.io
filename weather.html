<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHAT TO WEAR — Weather Outfit Advisor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

:root {
–bg: #0a0a0f;
–grid: rgba(0,120,255,0.07);
–blue: #0078ff;
–blue-dim: rgba(0,120,255,0.3);
–blue-bright: #4db8ff;
–text: #c8d8f0;
–text-dim: #4a6080;
–accent: #00e5ff;
–warn: #ff6b35;
–mono: ‘Share Tech Mono’, monospace;
–sans: ‘Rajdhani’, sans-serif;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–mono);
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* Blueprint grid */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(var(–grid) 1px, transparent 1px),
linear-gradient(90deg, var(–grid) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

/* Radial glow */
body::after {
content: ‘’;
position: fixed;
top: -20%;
left: 50%;
transform: translateX(-50%);
width: 80vw;
height: 60vh;
background: radial-gradient(ellipse, rgba(0,120,255,0.06) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
max-width: 720px;
margin: 0 auto;
padding: 40px 24px 80px;
}

/* Header */
header {
border-bottom: 1px solid var(–blue-dim);
padding-bottom: 24px;
margin-bottom: 40px;
}

.header-label {
font-size: 10px;
letter-spacing: 0.3em;
color: var(–text-dim);
text-transform: uppercase;
margin-bottom: 8px;
}

h1 {
font-family: var(–sans);
font-size: clamp(32px, 8vw, 56px);
font-weight: 700;
letter-spacing: 0.05em;
color: #fff;
line-height: 1;
text-transform: uppercase;
}

h1 span {
color: var(–blue);
}

.header-sub {
font-size: 11px;
color: var(–text-dim);
letter-spacing: 0.15em;
margin-top: 8px;
}

/* Location block */
.location-block {
display: flex;
gap: 12px;
align-items: flex-end;
margin-bottom: 32px;
flex-wrap: wrap;
}

.input-group {
flex: 1;
min-width: 200px;
}

.input-label {
font-size: 10px;
letter-spacing: 0.25em;
color: var(–text-dim);
text-transform: uppercase;
margin-bottom: 6px;
display: block;
}

input[type=“text”] {
width: 100%;
background: rgba(0,120,255,0.05);
border: 1px solid var(–blue-dim);
color: var(–text);
font-family: var(–mono);
font-size: 14px;
padding: 10px 14px;
outline: none;
transition: border-color 0.2s, background 0.2s;
}

input[type=“text”]:focus {
border-color: var(–blue);
background: rgba(0,120,255,0.1);
}

input[type=“text”]::placeholder {
color: var(–text-dim);
}

.btn {
background: transparent;
border: 1px solid var(–blue);
color: var(–blue-bright);
font-family: var(–mono);
font-size: 12px;
letter-spacing: 0.15em;
padding: 10px 20px;
cursor: pointer;
text-transform: uppercase;
transition: background 0.2s, color 0.2s;
white-space: nowrap;
}

.btn:hover {
background: var(–blue);
color: #000;
}

.btn-geo {
border-color: var(–text-dim);
color: var(–text-dim);
font-size: 11px;
}

.btn-geo:hover {
border-color: var(–accent);
color: var(–accent);
background: transparent;
}

/* Status / error */
.status {
font-size: 11px;
letter-spacing: 0.1em;
color: var(–text-dim);
margin-bottom: 24px;
min-height: 16px;
}

.status.error { color: var(–warn); }
.status.loading { color: var(–blue-bright); }

/* Weather display */
.weather-panel {
border: 1px solid var(–blue-dim);
padding: 24px;
margin-bottom: 32px;
display: none;
position: relative;
}

.weather-panel::before {
content: ‘WEATHER DATA’;
position: absolute;
top: -1px;
left: 16px;
background: var(–bg);
font-size: 9px;
letter-spacing: 0.3em;
color: var(–blue);
padding: 0 8px;
transform: translateY(-50%);
}

.weather-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
gap: 20px;
}

.weather-stat {
display: flex;
flex-direction: column;
gap: 4px;
}

.weather-stat-label {
font-size: 9px;
letter-spacing: 0.25em;
color: var(–text-dim);
text-transform: uppercase;
}

.weather-stat-value {
font-family: var(–sans);
font-size: 28px;
font-weight: 600;
color: #fff;
line-height: 1;
}

.weather-stat-value .unit {
font-size: 14px;
color: var(–blue-bright);
font-weight: 300;
}

.weather-desc {
font-size: 12px;
color: var(–text-dim);
margin-top: 4px;
}

/* Outfit panel */
.outfit-panel {
border: 1px solid var(–blue-dim);
padding: 24px;
display: none;
position: relative;
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.outfit-panel::before {
content: ‘OUTFIT RECOMMENDATION’;
position: absolute;
top: -1px;
left: 16px;
background: var(–bg);
font-size: 9px;
letter-spacing: 0.3em;
color: var(–accent);
padding: 0 8px;
transform: translateY(-50%);
}

.outfit-category {
margin-bottom: 20px;
}

.outfit-category:last-child {
margin-bottom: 0;
}

.outfit-cat-label {
font-size: 9px;
letter-spacing: 0.3em;
color: var(–text-dim);
text-transform: uppercase;
border-bottom: 1px solid rgba(0,120,255,0.15);
padding-bottom: 6px;
margin-bottom: 10px;
}

.outfit-items {
display: flex;
flex-direction: column;
gap: 6px;
}

.outfit-item {
font-size: 14px;
color: var(–text);
display: flex;
align-items: center;
gap: 10px;
}

.outfit-item::before {
content: ‘//’;
color: var(–blue);
font-size: 10px;
flex-shrink: 0;
}

.outfit-note {
margin-top: 20px;
padding: 12px 16px;
border-left: 2px solid var(–warn);
font-size: 12px;
color: var(–text-dim);
line-height: 1.6;
}

.outfit-note strong {
color: var(–warn);
font-weight: normal;
}

/* Footer */
footer {
margin-top: 60px;
border-top: 1px solid rgba(0,120,255,0.1);
padding-top: 20px;
font-size: 10px;
color: var(–text-dim);
letter-spacing: 0.1em;
display: flex;
justify-content: space-between;
flex-wrap: wrap;
gap: 8px;
}

footer a {
color: var(–blue-dim);
text-decoration: none;
letter-spacing: 0.05em;
}

footer a:hover { color: var(–blue); }

/* Style tabs */
.style-tabs {
display: none;
gap: 0;
margin-bottom: 0;
border-bottom: 1px solid var(–blue-dim);
}

.style-tab {
background: transparent;
border: 1px solid var(–blue-dim);
border-bottom: none;
color: var(–text-dim);
font-family: var(–mono);
font-size: 11px;
letter-spacing: 0.15em;
padding: 10px 20px;
cursor: pointer;
text-transform: uppercase;
transition: all 0.2s;
margin-right: -1px;
position: relative;
}

.style-tab:hover {
color: var(–text);
border-color: var(–blue);
}

.style-tab.active {
color: var(–accent);
border-color: var(–blue);
background: rgba(0,120,255,0.08);
}

.style-tab.active::after {
content: ‘’;
position: absolute;
bottom: -1px;
left: 0;
right: 0;
height: 1px;
background: var(–bg);
}

.outfit-panel-tabbed {
border: 1px solid var(–blue-dim);
border-top: none;
padding: 24px;
display: none;
position: relative;
animation: fadeIn 0.3s ease;
}

/* Loading dots */
.dots::after {
content: ‘’;
animation: dots 1.2s infinite;
}
@keyframes dots {
0%   { content: ‘.’; }
33%  { content: ‘..’; }
66%  { content: ‘…’; }
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="header-label">// OUTFIT SYSTEM v1.0</div>
    <h1>WHAT TO <span>WEAR</span></h1>
    <div class="header-sub">WEATHER-BASED OUTFIT ADVISOR — OPEN-METEO API</div>
  </header>

  <div class="location-block">
    <div class="input-group">
      <label class="input-label" for="cityInput">// Город</label>
      <input type="text" id="cityInput" placeholder="Москва, Санкт-Петербург..." />
    </div>
    <button class="btn" onclick="getWeatherByCity()">ПРОВЕРИТЬ</button>
    <button class="btn btn-geo" onclick="getWeatherByGeo()">◎ ГЕО</button>
  </div>

  <div class="status" id="status"></div>

  <div class="weather-panel" id="weatherPanel">
    <div class="weather-grid">
      <div class="weather-stat">
        <span class="weather-stat-label">// Температура</span>
        <span class="weather-stat-value" id="wTemp">—<span class="unit">°C</span></span>
        <span class="weather-desc" id="wFeels"></span>
      </div>
      <div class="weather-stat">
        <span class="weather-stat-label">// Влажность</span>
        <span class="weather-stat-value" id="wHumid">—<span class="unit">%</span></span>
      </div>
      <div class="weather-stat">
        <span class="weather-stat-label">// Осадки</span>
        <span class="weather-stat-value" id="wRain">—<span class="unit">мм</span></span>
      </div>
      <div class="weather-stat">
        <span class="weather-stat-label">// Ветер</span>
        <span class="weather-stat-value" id="wWind">—<span class="unit">км/ч</span></span>
      </div>
    </div>
  </div>

  <div class="style-tabs" id="styleTabs">
    <button class="style-tab active" onclick="switchStyle('casual')">// Повседневный</button>
    <button class="style-tab" onclick="switchStyle('sport')">// Спортивный</button>
    <button class="style-tab" onclick="switchStyle('business')">// Деловой</button>
  </div>
  <div class="outfit-panel-tabbed" id="outfitPanel">
    <div id="outfitContent"></div>
  </div>

  <footer>
    <span>// MAX-LIBO.GITHUB.IO</span>
    <span>ДАННЫЕ: OPEN-METEO.COM — <a href="https://open-meteo.com" target="_blank">OPEN SOURCE</a></span>
  </footer>
</div>

<script>
// ─── OUTFIT DATABASE ───────────────────────────────────────────────────────────
// Три стиля: casual, sport, business — каждый под свои погодные условия

let currentWeather = null;
let currentStyle = 'casual';

function getOutfits(temp, feelsLike, rain, wind, humidity) {
  const note = buildNote(temp, feelsLike, wind);

  // ── ПОВСЕДНЕВНЫЙ ──
  const casual = { note };
  if (feelsLike >= 25) {
    casual.top = ['Футболка'];
    casual.bottom = ['Шорты или лёгкие брюки'];
    casual.outer = [];
    casual.shoes = rain > 0.5 ? ['Кроссовки или лёгкие ботинки'] : ['Кроссовки или сандалии'];
  } else if (feelsLike >= 18) {
    casual.top = ['Футболка или лёгкий лонгслив'];
    casual.bottom = ['Джинсы или хлопковые брюки'];
    casual.outer = ['Лёгкая рубашка или ветровка'];
    casual.shoes = rain > 0.5 ? ['Кроссовки'] : ['Кроссовки или лоферы'];
  } else if (feelsLike >= 10) {
    casual.top = ['Лонгслив или свитшот'];
    casual.bottom = ['Джинсы'];
    casual.outer = ['Демисезонная куртка или тренч'];
    casual.shoes = rain > 0.5 ? ['Ботинки или непромокаемые кроссовки'] : ['Кроссовки или ботинки'];
  } else if (feelsLike >= 0) {
    casual.top = ['Термобельё', 'Толстовка или свитер'];
    casual.bottom = ['Плотные джинсы'];
    casual.outer = ['Зимняя куртка'];
    casual.shoes = ['Утеплённые ботинки'];
  } else {
    casual.top = ['Термобельё (базовый слой)', 'Флис или толстый свитер'];
    casual.bottom = ['Термобельё под брюки', 'Плотные брюки'];
    casual.outer = ['Тёплый пуховик'];
    casual.shoes = ['Зимние ботинки'];
  }
  casual.extras = buildExtras(feelsLike, rain, wind, humidity);

  // ── СПОРТИВНЫЙ ──
  const sport = { note };
  if (feelsLike >= 20) {
    sport.top = ['Спортивная футболка (дышащая ткань)'];
    sport.bottom = ['Шорты или тайтсы'];
    sport.outer = [];
    sport.shoes = rain > 0.5 ? ['Беговые кроссовки с водоотталкивающим верхом'] : ['Беговые или спортивные кроссовки'];
  } else if (feelsLike >= 12) {
    sport.top = ['Спортивный лонгслив или термофутболка'];
    sport.bottom = ['Тайтсы или спортивные брюки'];
    sport.outer = ['Лёгкая спортивная ветровка'];
    sport.shoes = ['Беговые кроссовки'];
  } else if (feelsLike >= 4) {
    sport.top = ['Термобельё', 'Флисовый джемпер'];
    sport.bottom = ['Утеплённые тайтсы'];
    sport.outer = ['Ветрозащитная куртка'];
    sport.shoes = ['Беговые кроссовки с утеплением'];
  } else {
    sport.top = ['Термобельё (плотное)', 'Флис'];
    sport.bottom = ['Утеплённые тайтсы или штаны'];
    sport.outer = ['Зимняя спортивная куртка'];
    sport.shoes = ['Зимние беговые кроссовки или ботинки'];
  }
  sport.extras = buildExtras(feelsLike, rain, wind, humidity, true);

  // ── ДЕЛОВОЙ ──
  const business = { note };
  if (feelsLike >= 22) {
    business.top = ['Рубашка или лёгкая блузка'];
    business.bottom = ['Брюки или юбка'];
    business.outer = [];
    business.shoes = ['Туфли или лоферы'];
  } else if (feelsLike >= 14) {
    business.top = ['Рубашка + тонкий джемпер или пиджак'];
    business.bottom = ['Брюки или деловая юбка'];
    business.outer = ['Пальто или тренч'];
    business.shoes = rain > 0.5 ? ['Закрытые туфли или ботинки'] : ['Туфли или дерби'];
  } else if (feelsLike >= 5) {
    business.top = ['Рубашка + свитер или водолазка', 'Пиджак поверх'];
    business.bottom = ['Деловые брюки'];
    business.outer = ['Пальто или утеплённый тренч'];
    business.shoes = ['Ботинки или закрытые туфли'];
  } else {
    business.top = ['Термобельё (невидимый слой)', 'Рубашка + пиджак'];
    business.bottom = ['Деловые брюки (с термобельём под низ)'];
    business.outer = ['Тёплое пальто или пуховик'];
    business.shoes = ['Утеплённые ботинки'];
  }
  business.extras = buildExtras(feelsLike, rain, wind, humidity);

  return { casual, sport, business };
}

function buildExtras(feelsLike, rain, wind, humidity, isSport = false) {
  const extras = [];
  if (rain > 1) extras.push('Зонт');
  else if (rain > 0.1) extras.push('Складной зонт');
  if (feelsLike < 5) extras.push(isSport ? 'Спортивная шапка' : 'Шапка');
  if (feelsLike < 2) extras.push(isSport ? 'Бафф или балаклава' : 'Шарф');
  if (feelsLike < -5) extras.push('Перчатки');
  if (wind > 30) extras.push('Ветрозащитный слой обязателен');
  if (feelsLike >= 20 && humidity < 40) extras.push('Солнечные очки');
  return extras;
}

function buildNote(temp, feelsLike, wind) {
  if (temp - feelsLike >= 5) return `<strong>// ВЕТЕР:</strong> Реально ${Math.round(temp)}°C, но ощущается как ${Math.round(feelsLike)}°C. Одевайтесь по ощущаемой.`;
  if (feelsLike >= 28) return `<strong>// ЖАРА:</strong> Выбирайте лёгкие дышащие ткани. Не забудьте воду.`;
  if (feelsLike <= -10) return `<strong>// МОРОЗ:</strong> Закройте лицо и руки — открытая кожа мёрзнет быстро.`;
  return null;
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function renderOutfit(outfit) {
  const sections = [
    { label: '// Верх', items: outfit.top },
    { label: '// Низ', items: outfit.bottom },
    { label: '// Верхняя одежда', items: outfit.outer },
    { label: '// Обувь', items: outfit.shoes },
    { label: '// Аксессуары', items: outfit.extras },
  ];

  let html = '';
  for (const sec of sections) {
    if (!sec.items || sec.items.length === 0) continue;
    html += `<div class="outfit-category">
      <div class="outfit-cat-label">${sec.label}</div>
      <div class="outfit-items">
        ${sec.items.map(i => `<div class="outfit-item">${i}</div>`).join('')}
      </div>
    </div>`;
  }
  if (outfit.note) html += `<div class="outfit-note">${outfit.note}</div>`;

  document.getElementById('outfitContent').innerHTML = html;
  document.getElementById('outfitPanel').style.display = 'block';
  document.getElementById('styleTabs').style.display = 'flex';
}

function switchStyle(style) {
  if (!currentWeather) return;
  currentStyle = style;

  // Update tab states
  document.querySelectorAll('.style-tab').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  const outfits = getOutfits(
    currentWeather.temp, currentWeather.feelsLike,
    currentWeather.rain, currentWeather.wind, currentWeather.humidity
  );
  renderOutfit(outfits[style]);
}

// ─── WEATHER DISPLAY ───────────────────────────────────────────────────────────
function renderWeather(data) {
  const { temp, feelsLike, rain, wind, humidity } = data;

  document.getElementById('wTemp').innerHTML = `${Math.round(temp)}<span class="unit">°C</span>`;
  document.getElementById('wFeels').textContent = `Ощущается как ${Math.round(feelsLike)}°C`;
  document.getElementById('wHumid').innerHTML = `${humidity}<span class="unit">%</span>`;
  document.getElementById('wRain').innerHTML = `${rain.toFixed(1)}<span class="unit">мм</span>`;
  document.getElementById('wWind').innerHTML = `${Math.round(wind)}<span class="unit">км/ч</span>`;

  document.getElementById('weatherPanel').style.display = 'block';
}

// ─── OPEN-METEO FETCH ──────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  setStatus('Загрузка данных о погоде', 'loading');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,precipitation,relative_humidity_2m,wind_speed_10m&timezone=auto`;

  const res = await fetch(url);
  if (!res.ok) throw new Error('Ошибка запроса погоды');
  const json = await res.json();
  const c = json.current;

  return {
    temp: c.temperature_2m,
    feelsLike: c.apparent_temperature,
    rain: c.precipitation,
    wind: c.wind_speed_10m,
    humidity: c.relative_humidity_2m,
  };
}

// ─── GEOCODING ─────────────────────────────────────────────────────────────────
async function geocodeCity(city) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru&format=json`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.results || json.results.length === 0) throw new Error('Город не найден');
  return { lat: json.results[0].latitude, lon: json.results[0].longitude, name: json.results[0].name };
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────────
async function getWeatherByCity() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) { setStatus('Введите название города', 'error'); return; }

  try {
    setStatus('Поиск города', 'loading');
    const { lat, lon, name } = await geocodeCity(city);
    setStatus(`// ${name} — ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
    const weather = await fetchWeather(lat, lon);
    currentWeather = weather;
    currentStyle = 'casual';
    document.querySelectorAll('.style-tab').forEach((btn, i) => btn.classList.toggle('active', i === 0));
    renderWeather(weather);
    const outfits = getOutfits(weather.temp, weather.feelsLike, weather.rain, weather.wind, weather.humidity);
    renderOutfit(outfits.casual);
    setStatus(`// ДАННЫЕ АКТУАЛЬНЫ`);
  } catch (e) {
    setStatus(e.message, 'error');
  }
}

async function getWeatherByGeo() {
  if (!navigator.geolocation) { setStatus('Геолокация не поддерживается', 'error'); return; }
  setStatus('Определение геолокации', 'loading');

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const weather = await fetchWeather(pos.coords.latitude, pos.coords.longitude);
      currentWeather = weather;
      currentStyle = 'casual';
      document.querySelectorAll('.style-tab').forEach((btn, i) => btn.classList.toggle('active', i === 0));
      renderWeather(weather);
      const outfits = getOutfits(weather.temp, weather.feelsLike, weather.rain, weather.wind, weather.humidity);
      renderOutfit(outfits.casual);
      setStatus(`// ГЕО: ${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`);
    } catch(e) {
      setStatus(e.message, 'error');
    }
  }, () => {
    setStatus('Геолокация отклонена. Введите город вручную.', 'error');
  });
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
  if (type === 'loading') el.classList.add('dots');
}

// Enter key
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') getWeatherByCity();
});
</script>

</body>
</html>
