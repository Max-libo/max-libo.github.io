<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>часы.АРТ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%; height: 100%;
background: #f5f0e8;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
overflow: hidden;
}

header {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: clamp(1rem, 3.5vw, 1.6rem);
letter-spacing: 0.35em;
text-transform: lowercase;
color: #3a3830;
margin-bottom: clamp(16px, 3.5vh, 32px);
}
header span { font-weight: 600; color: #b5241c; }

.clock-wrap {
width: min(72vw, 72vh, 480px);
height: min(72vw, 72vh, 480px);
}

footer {
margin-top: clamp(14px, 3vh, 28px);
font-family: ‘EB Garamond’, serif;
font-style: italic;
font-size: clamp(0.7rem, 2vw, 0.95rem);
letter-spacing: 0.05em;
color: #8a8578;
text-align: center;
}
</style>

</head>
<body>

<header>часы<span>.АРТ</span></header>

<div class="clock-wrap">
<svg id="clock" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Face -->

  <circle cx="100" cy="100" r="96" fill="#faf6ee" stroke="#d4ccbc" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#e0d8cc" stroke-width="0.4"/>

  <!-- Tick marks generated by JS -->

<g id="ticks"></g>

  <!-- Numerals -->

  <g font-family="'Cormorant Garamond',serif" font-size="8" fill="#1a1a18" text-anchor="middle" dominant-baseline="central">
    <text x="100" y="23">XII</text>
    <text x="148" y="38">I</text>
    <text x="170" y="70">II</text>
    <text x="178" y="100">III</text>
    <text x="170" y="130">IV</text>
    <text x="148" y="162">V</text>
    <text x="100" y="177">VI</text>
    <text x="52"  y="162">VII</text>
    <text x="30"  y="130">VIII</text>
    <text x="22"  y="100">IX</text>
    <text x="30"  y="70">X</text>
    <text x="52"  y="38">XI</text>
  </g>

  <!-- Hour hand: from center upward -->

<line id="hand-hour"
x1="100" y1="100" x2="100" y2="48"
stroke="#1a1a18" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Minute hand -->

<line id="hand-minute"
x1="100" y1="100" x2="100" y2="24"
stroke="#1a1a18" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Second hand: needle up + tail down, both rotated together -->

<line id="s-needle"
x1="100" y1="100" x2="100" y2="20"
stroke="#b5241c" stroke-width="1.1" stroke-linecap="round"/>
<line id="s-tail"
x1="100" y1="100" x2="100" y2="118"
stroke="#b5241c" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Center -->

  <circle cx="100" cy="100" r="3" fill="#1a1a18"/>
  <circle cx="100" cy="100" r="1.4" fill="#b5241c"/>

</svg>
</div>

<footer>четырнадцать минут пятьдесят девять секунд до коллапса</footer>

<script>
// ── Tick marks ────────────────────────────────────────────────────────
const ticksEl = document.getElementById('ticks');
for (let i = 0; i < 60; i++) {
  const isHour = i % 5 === 0;
  const rad = (i * 6 - 90) * Math.PI / 180;
  const r1 = isHour ? 78 : 83;
  const x1 = 100 + r1 * Math.cos(rad);
  const y1 = 100 + r1 * Math.sin(rad);
  const x2 = 100 + 88 * Math.cos(rad);
  const y2 = 100 + 88 * Math.sin(rad);
  const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
  ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
  ln.setAttribute('stroke', '#1a1a18');
  ln.setAttribute('stroke-width', isHour ? '1.8' : '0.7');
  ticksEl.appendChild(ln);
}

// ── Set frozen hands ──────────────────────────────────────────────────
function rot(id, deg) {
  document.getElementById(id).setAttribute('transform', `rotate(${deg} 100 100)`);
}

const H = 23, M = 45;
rot('hand-hour',   ((H % 12) * 30) + (M * 0.5)); // 337.5°
rot('hand-minute', M * 6);                         // 270°

// Second hand rests at 354° — one tick before 12
const REST = 354;
rot('s-needle', REST);
rot('s-tail',   REST);

// ── Twitch via RAF ────────────────────────────────────────────────────
// [t 0..1, angleDelta]
const KF = [
  [0.00, 0],
  [0.09, 6],   // рывок вперёд на 1 деление
  [0.22, 0],   // откат назад
  [0.30, 2],   // дрожь
  [0.38, 0],
  [1.00, 0],
];
const DUR = 480;
let tStart = null, rafId = null;

function lerp(a, b, t) { return a + (b-a)*t; }

function frame(ts) {
  if (!tStart) tStart = ts;
  const t = Math.min((ts - tStart) / DUR, 1);
  let delta = 0;
  for (let i = 0; i < KF.length - 1; i++) {
    const [t0,a0] = KF[i], [t1,a1] = KF[i+1];
    if (t >= t0 && t <= t1) { delta = lerp(a0, a1, (t-t0)/(t1-t0)); break; }
  }
  const a = REST + delta;
  rot('s-needle', a);
  rot('s-tail',   a);
  if (t < 1) {
    rafId = requestAnimationFrame(frame);
  } else {
    rot('s-needle', REST);
    rot('s-tail',   REST);
    tStart = null; rafId = null;
  }
}

function twitch() {
  if (rafId) cancelAnimationFrame(rafId);
  tStart = null;
  rafId = requestAnimationFrame(frame);
}

twitch();
setInterval(twitch, 1000);
</script>

</body>
</html>
