<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Максим Либо</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .line {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 40px 0;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.5;
      text-transform: uppercase;
      margin-top: 12px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 6px;
      opacity: 0.4;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    p {
      font-size: 14px;
      line-height: 2;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section-label">// портфолио</div>
    <h1>Максим Либо</h1>
    <p class="subtitle">Дизайнер · Москва</p>
    <div class="line"></div>
    <div class="section-label">// обо мне</div>
    <p>Напиши здесь пару слов о себе.</p>
    <div class="line"></div>
  </div>
</body>
</html>
